      - application/octet-stream
      responses:
        "200":
          description: 成功获取文件内容
          schema:
            type: file
        "400":
          description: 文件 ID 格式错误
          schema:
            $ref: '#/definitions/response.Any'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Any'
        "404":
          description: 文件未找到
          schema:
            $ref: '#/definitions/response.Any'
        "500":
          description: 服务内部错误
          schema:
            $ref: '#/definitions/response.Any'
      summary: 获取已上传文件
      tags:
      - upload
  /robots.txt:
    get:
      description: 根据系统配置决定是否允许搜索引擎检索，并返回相应的 robots.txt 文件内容
      produces:
      - text/plain
      responses:
        "200":
          description: robots.txt 内容
          schema:
            type: string
      summary: 获取 robots.txt
      tags:
      - config
securityDefinitions:
  SessionCookie:
    in: cookie
    name: session
    type: apiKey
