        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Any'
        "403":
          description: 无管理员权限
          schema:
            $ref: '#/definitions/response.Any'
        "500":
          description: 服务内部错误
          schema:
            $ref: '#/definitions/response.Any'
      security:
      - SessionCookie: []
      summary: 更新缓存配置
      tags:
      - admin
  /api/v1/admin/cache/status:
    get:
      description: 获取当前系统磁盘缓存的使用情况（已占用字节、Key 数量等）与策略配置
      produces:
